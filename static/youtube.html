<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>YouTube Transcript Analyzer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f0f;
    color: #e1e1e1;
    min-height: 100vh;
    padding: 16px;
  }
  h1 {
    font-size: 1.4rem;
    text-align: center;
    margin-bottom: 20px;
    color: #ff4444;
  }
  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  input[type="text"] {
    flex: 1;
    padding: 14px 12px;
    border-radius: 10px;
    border: 1px solid #333;
    background: #1a1a1a;
    color: #fff;
    font-size: 16px; /* prevents iOS zoom */
    outline: none;
  }
  input[type="text"]:focus { border-color: #ff4444; }
  button {
    padding: 14px 20px;
    border-radius: 10px;
    border: none;
    background: #ff4444;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  button:disabled { opacity: 0.5; }
  button:active { background: #cc3333; }

  .loader {
    text-align: center;
    padding: 40px 0;
    display: none;
  }
  .loader.active { display: block; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #333;
    border-top-color: #ff4444;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    background: #3a1a1a;
    border: 1px solid #ff4444;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 16px;
    display: none;
  }
  .error.active { display: block; }

  .results { display: none; }
  .results.active { display: block; }

  .card {
    background: #1a1a1a;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .card h2 {
    font-size: 1rem;
    color: #ff4444;
    margin-bottom: 10px;
  }
  .card p, .card li {
    font-size: 0.92rem;
    line-height: 1.5;
    color: #ccc;
  }
  .card ul { padding-left: 20px; }
  .card li { margin-bottom: 8px; }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .stat-box {
    background: #1a1a1a;
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }
  .stat-box .value {
    font-size: 1.4rem;
    font-weight: 700;
    color: #ff4444;
  }
  .stat-box .label {
    font-size: 0.75rem;
    color: #888;
    margin-top: 4px;
  }

  .topics {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .topic-tag {
    background: #2a1a1a;
    border: 1px solid #ff444466;
    color: #ff8888;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 0.82rem;
  }

  .transcript-preview {
    font-size: 0.85rem;
    color: #999;
    line-height: 1.6;
    max-height: 200px;
    overflow-y: auto;
    white-space: pre-wrap;
  }
</style>
</head>
<body>

<h1>YouTube Transcript Analyzer</h1>

<div class="input-row">
  <input type="text" id="urlInput" placeholder="Paste YouTube URL..." autocomplete="off">
  <button id="analyzeBtn" onclick="analyze()">Go</button>
</div>

<div class="error" id="errorBox"></div>

<div class="loader" id="loader">
  <div class="spinner"></div>
  <p>Fetching transcript & analyzing...</p>
</div>

<div class="results" id="results">
  <div class="stats" id="statsGrid"></div>

  <div class="card">
    <h2>Summary</h2>
    <p id="summary"></p>
  </div>

  <div class="card">
    <h2>Key Takeaways</h2>
    <ul id="takeaways"></ul>
  </div>

  <div class="card">
    <h2>Topics</h2>
    <div class="topics" id="topics"></div>
  </div>

  <div class="card">
    <h2>Transcript Preview</h2>
    <div class="transcript-preview" id="preview"></div>
  </div>
</div>

<script>
const API_BASE = window.location.origin;

async function analyze() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return;

  const btn = document.getElementById('analyzeBtn');
  const loader = document.getElementById('loader');
  const results = document.getElementById('results');
  const errorBox = document.getElementById('errorBox');

  btn.disabled = true;
  loader.classList.add('active');
  results.classList.remove('active');
  errorBox.classList.remove('active');

  try {
    const res = await fetch(`${API_BASE}/youtube/analyze`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `Error ${res.status}`);
    }

    const data = await res.json();
    renderResults(data);
  } catch (e) {
    errorBox.textContent = e.message;
    errorBox.classList.add('active');
  } finally {
    btn.disabled = false;
    loader.classList.remove('active');
  }
}

function renderResults(data) {
  // Stats
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-box"><div class="value">${data.video_duration_min}m</div><div class="label">Video Length</div></div>
    <div class="stat-box"><div class="value">${data.word_count.toLocaleString()}</div><div class="label">Words</div></div>
    <div class="stat-box"><div class="value">${data.estimated_reading_time_min}m</div><div class="label">Read Time</div></div>
    <div class="stat-box"><div class="value">${data.key_takeaways.length}</div><div class="label">Takeaways</div></div>
  `;

  // Summary
  document.getElementById('summary').textContent = data.summary;

  // Takeaways
  document.getElementById('takeaways').innerHTML = data.key_takeaways
    .map(t => `<li>${escapeHtml(t)}</li>`).join('');

  // Topics
  document.getElementById('topics').innerHTML = data.topics
    .map(t => `<span class="topic-tag">${escapeHtml(t)}</span>`).join('');

  // Preview
  document.getElementById('preview').textContent = data.transcript_preview;

  document.getElementById('results').classList.add('active');
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// Allow Enter key to trigger analysis
document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') analyze();
});
</script>

</body>
</html>
